<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Permit Database</title><link rel="stylesheet" href="/database.css"></head><body>
<header><div><small>PLYMOUTH PERMIT MANAGER</small><h1>Permit database</h1></div><nav><a href="/dashboard">Dashboard</a><a href="/permits">Public lookup</a><a href="/evidence">Evidence</a></nav></header>
<main>
<section class="stats"><article><span>Database</span><strong id="dbState">Checking…</strong></article><article><span>Records shown</span><strong id="recordCount">0</strong></article><article><span>Due / expired</span><strong id="dueCount">0</strong></article></section>
<section class="panel toolbar"><input id="search" placeholder="Search registration, plate or callsign"><select id="status"><option value="">All statuses</option><option value="valid">Valid</option><option value="due">Due within 30 days</option><option value="expired">Expired</option><option value="missing">No date</option><option value="suspended">Suspended</option></select><button id="newBtn">NEW / UPDATE PERMIT</button><button id="refreshBtn" class="secondary">REFRESH</button></section>
<section class="panel"><div class="tabs"><button class="active" data-tab="permits">PERMITS</button><button data-tab="audit">AUDIT LOG</button><button data-tab="system">SYSTEM LOG</button><button data-tab="api">API ACCESS</button></div><div id="content"></div></section>
</main>
<dialog id="editDialog"><form id="editForm" method="dialog"><h2>Permit record</h2><div class="grid"><label>Registration<input name="registration" required maxlength="12"></label><label>Plate number<input name="plateNumber"></label><label>Operator<input name="operator" value="Independent"></label><label>Callsign<input name="callsign"></label><label>Permit number<input name="permitNumber"></label><label>Permit type<input name="permitType" value="Plymouth Taxi Permit"></label><label>Valid from<input name="validFrom" type="date"></label><label>Expires on<input name="expiresOn" type="date"></label></div><label>Permit notes<textarea name="permitNotes" rows="3"></textarea></label><div class="checks"><label><input type="checkbox" name="needACab"> Need-A-Cab vehicle</label><label><input type="checkbox" name="permitSuspended"> Permit suspended</label></div><p id="formError" class="error"></p><div class="actions"><button type="button" id="cancelBtn" class="secondary">CANCEL</button><button type="submit">SAVE PERMIT</button></div></form></dialog>
<dialog id="keyDialog"><form id="keyForm" method="dialog"><h2>Create API key</h2><label>Integration name<input name="name" required placeholder="PlymHub kiosk lookup"></label><div class="checks"><label><input type="checkbox" name="read" checked> permit:read</label><label><input type="checkbox" name="write"> permit:write</label></div><p class="muted">The full key is shown once only.</p><pre id="keyResult"></pre><div class="actions"><button type="button" id="keyCancel" class="secondary">CLOSE</button><button type="submit">CREATE KEY</button></div></form></dialog>
<script src="/database.js" defer></script></body></html>
