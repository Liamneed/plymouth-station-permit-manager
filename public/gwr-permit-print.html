<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GWR Station Permit</title><style>
*{box-sizing:border-box}body{margin:0;background:#e9edf2;font-family:Arial,Helvetica,sans-serif;color:#111}.toolbar{max-width:820px;margin:18px auto 0;display:flex;justify-content:flex-end;gap:10px}.toolbar button{padding:11px 18px;border:0;border-radius:7px;background:#12233f;color:#fff;font-weight:700;cursor:pointer}.permit{width:780px;min-height:520px;margin:16px auto;background:#fff;border:10px solid #12233f;position:relative;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;background:#12233f;color:#fff}.top h1{margin:0;font-size:28px;letter-spacing:.03em}.top p{margin:5px 0 0;color:#d9e2ef;font-weight:700}.gwr{font-size:36px;font-weight:900;letter-spacing:-.05em}.stripe{height:10px;background:#f4c21d}.body{display:grid;grid-template-columns:230px 1fr;gap:24px;padding:24px}.photo{width:230px;height:280px;border:3px solid #12233f;background:#eef1f5;display:grid;place-items:center;overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover}.photo span{color:#667085;font-weight:700}.details h2{font-size:28px;margin:0 0 16px}.grid{display:grid;grid-template-columns:1fr 1fr;border:2px solid #12233f}.field{padding:13px;border-right:1px solid #aeb7c4;border-bottom:1px solid #aeb7c4}.field:nth-child(even){border-right:0}.field.full{grid-column:1/-1;border-right:0}.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#526075;font-weight:800}.field strong{display:block;margin-top:5px;font-size:20px;overflow-wrap:anywhere}.expiry strong{color:#a51d21;font-size:25px}.footer{display:flex;justify-content:space-between;align-items:flex-end;padding:0 24px 22px}.notice{max-width:520px;font-size:12px;line-height:1.4;color:#475467}.permit-no{text-align:right;font-size:11px;color:#667085}.loading{padding:80px;text-align:center}@media print{body{background:#fff}.toolbar{display:none}.permit{margin:0;border-width:10px;page-break-inside:avoid}@page{size:A4 landscape;margin:12mm}}
</style></head><body><div class="toolbar"><button onclick="window.print()">Print permit</button></div><main id="permit" class="permit"><div class="loading">Loading permit…</div></main><script>
const id=location.pathname.split('/').pop(),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));fetch(`/api/gwr-permit/${encodeURIComponent(id)}`).then(async r=>{const d=await r.json();if(!r.ok)throw Error(d.error||'Unable to load permit');const x=d.record;document.getElementById('permit').innerHTML=`<div class="top"><div><h1>Plymouth Train Station</h1><p>Hackney Carriage Display Permit</p></div><div class="gwr">GWR</div></div><div class="stripe"></div><div class="body"><div class="photo">${x.photoFile?`<img src="/api/gwr-permit-photo/${esc(x.vehicleId)}" alt="Driver photograph">`:'<span>No photograph</span>'}</div><div class="details"><h2>${esc(x.driverName)}</h2><div class="grid"><div class="field"><label>Driver badge / licence</label><strong>${esc(x.driverNumber)}</strong></div><div class="field"><label>Callsign</label><strong>${esc(x.callsign)}</strong></div><div class="field"><label>Vehicle registration</label><strong>${esc(x.registration)}</strong></div><div class="field"><label>Taxi plate number</label><strong>${esc(x.plateNumber)}</strong></div><div class="field full expiry"><label>Permit expiry date</label><strong>${esc(x.permitExpiryDate?new Date(x.permitExpiryDate+'T00:00:00Z').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric',timeZone:'UTC'}):'No expiry date')}</strong></div></div></div></div><div class="footer"><div class="notice">This permit is issued for display while operating from the Plymouth Train Station Hackney rank. It remains valid only while the vehicle and driver details shown are current and the permit has not expired.</div><div class="permit-no">Vehicle ID ${esc(x.vehicleId)}<br>Updated ${esc(new Date(x.updatedAt).toLocaleDateString('en-GB'))}</div></div>`}).catch(e=>document.getElementById('permit').innerHTML=`<div class="loading">${esc(e.message)}</div>`);
</script></body></html>
