<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101827">
  <title>Plymouth Station Rank</title>
  <link rel="stylesheet" href="/hackney.css">
</head>
<body>
<header class="topbar">
  <div class="title-wrap"><div class="brand">N</div><div><h1>Station Rank</h1><p>Need-A-Cab Hackneys with H capability only</p></div></div>
  <button id="refreshBtn" type="button">Refresh</button>
</header>
<section class="controls">
  <input id="searchInput" type="search" placeholder="Search callsign, registration or plate…" autocomplete="off">
  <select id="statusFilter" aria-label="Filter vehicles"><option value="all">All vehicles</option><option value="working">Working</option><option value="offline">Offline</option><option value="suspended">Suspended</option><option value="issues">Permit issues</option></select>
</section>
<section id="statusCounts" class="counts" aria-label="Rank totals"></section>
<div class="column-head"><span>Callsign</span><span>Status</span><span>Registration</span><span>N-A-C permit</span><span>Plymouth</span></div>
<main><div id="rows"><div class="message">Loading Need-A-Cab Hackneys…</div></div></main>
<script>
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm=v=>String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
let vehicles=[],statuses=new Map();
const getList=d=>Array.isArray(d)?d:(d?.items||d?.results||d?.vehicles||d?.data||[]);
const cs=v=>String(v.callsign??v.callSign??v.code??'');
const reg=v=>String(v.registration??v.vrm??'');
const plate=v=>String(v.plateNumber??v.plate??'');
const suspended=v=>v.isSuspended===true;
function statusFor(v){
  if(suspended(v))return {key:'suspended',label:'SUSPENDED'};
  const s=statuses.get(norm(cs(v)))||{};const code=String(s.driverStatusCode||'');const label=String(s.driverStatus||s.driverStatusLabel||'').toUpperCase();
  if(!s.online||code==='NotWorking'||label==='OFFLINE')return {key:'offline',label:'OFFLINE'};
  const map={Clear:'CLEAR',BusyMeterOff:'DISPATCH',BusyMeterOffAccount:'DISPATCH ACC',BusyMeterOnFromMeterOffCash:'BUSY CASH',BusyMeterOnFromMeterOffAccount:'BUSY ACC',BusyMeterOnFromClear:'RANK',JobOffered:'OFFER'};
  return {key:'working',label:map[code]||label||'WORKING'};
}
function nacPermit(v){
  const expiry=v.permitExpiryDate||v.motExpiryDate;
  if(!expiry)return {key:'issue',short:'NO DATE',title:'No Need-A-Cab permit expiry date is recorded'};
  const d=new Date(expiry);const day=new Date(d.getFullYear(),d.getMonth(),d.getDate());const today=new Date();today.setHours(0,0,0,0);const days=Math.ceil((day-today)/86400000);
  if(days<0)return {key:'issue',short:'EXPIRED',title:'Need-A-Cab permit has expired'};
  if(days<=30)return {key:'due',short:`DUE ${days}d`,title:`Need-A-Cab permit expires in ${days} day${days===1?'':'s'}`};
  return {key:'valid',short:'VALID',title:`Need-A-Cab permit valid until ${d.toLocaleDateString('en-GB')}`};
}
function cityPermit(v){
  if(v.plymouthRegisterLoaded===false)return {key:'neutral',short:'NOT LOADED',title:'Plymouth register has not been loaded'};
  if(v.plymouthListed!==true)return {key:'issue',short:'NOT LISTED',title:'Registration not found in the uploaded Plymouth register'};
  if(v.plymouthPlateMatch!==true)return {key:'issue',short:`P${esc(v.plymouthPlateNumber||'?')} MISMATCH`,title:`Plymouth plate ${v.plymouthPlateNumber||'unknown'} does not match Autocab plate ${plate(v)||'blank'}`};
  return {key:'valid',short:`P${esc(v.plymouthPlateNumber)}`,title:'Registration and plate match the uploaded Plymouth register'};
}
function renderCounts(){
  const all=vehicles.map(statusFor);const data=[['Working',all.filter(x=>x.key==='working').length,'working'],['Offline',all.filter(x=>x.key==='offline').length,'offline'],['Suspended',all.filter(x=>x.key==='suspended').length,'suspended'],['Total',vehicles.length,'total']];
  $('statusCounts').innerHTML=data.map(([l,n,k])=>`<div class="count ${k}"><span>${l}</span><strong>${n}</strong></div>`).join('');
}
function render(){
  const q=norm($('searchInput').value),f=$('statusFilter').value;
  let list=vehicles.filter(v=>{const st=statusFor(v),np=nacPermit(v),cp=cityPermit(v);const search=!q||norm(`${cs(v)}${reg(v)}${plate(v)}${v.plymouthPlateNumber||''}`).includes(q);const issue=np.key==='issue'||cp.key==='issue';return search&&(f==='all'||f===st.key||(f==='issues'&&issue));});
  list.sort((a,b)=>Number(cs(a))-Number(cs(b)));renderCounts();
  $('rows').innerHTML=list.length?list.map(v=>{const st=statusFor(v),np=nacPermit(v),cp=cityPermit(v);return `<article class="rank-row ${st.key}" title="${esc(np.title)}. ${esc(cp.title)}"><span class="callsign">${esc(cs(v)||'—')}</span><span class="status ${st.key}">${esc(st.label)}</span><span class="registration">${esc(reg(v)||'—')}</span><span class="permit ${np.key}">${np.short}</span><span class="city ${cp.key}">${cp.short}</span></article>`}).join(''):'<div class="message">No vehicles match this view.</div>';
}
async function loadVehicles(){const r=await fetch('/api/rank-vehicles',{cache:'no-store'});const d=await r.json();if(!r.ok)throw new Error(d.error||'Unable to load rank vehicles');vehicles=getList(d);}
async function loadStatus(){const r=await fetch('/api/status',{cache:'no-store'});if(!r.ok)return;statuses=new Map(getList(await r.json()).map(x=>[norm(x.callsign),x]));}
async function load(){try{await Promise.all([loadVehicles(),loadStatus()]);render();}catch(e){$('rows').innerHTML=`<div class="message error">${esc(e.message)}</div>`}}
$('searchInput').addEventListener('input',render);$('statusFilter').addEventListener('change',render);$('refreshBtn').addEventListener('click',load);load();setInterval(async()=>{await loadStatus();render()},5000);setInterval(load,60000);
try{const es=new EventSource('/api/status/stream');es.addEventListener('status',e=>{const x=JSON.parse(e.data);statuses.set(norm(x.callsign),x);render()});}catch{}
</script>
</body></html>
