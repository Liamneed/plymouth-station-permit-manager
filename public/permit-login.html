<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Permit Administration | Need-A-Cab</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 214, 0, 0.18), transparent 36%),
        linear-gradient(135deg, #101010, #222);
      color: #1b1b1b;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 20px;
      padding: 34px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .brand {
      display: inline-block;
      margin-bottom: 20px;
      padding: 9px 14px;
      border-radius: 999px;
      background: #111111;
      color: #ffd600;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.15;
    }

    .intro {
      margin: 0 0 26px;
      color: #5b5b5b;
      line-height: 1.55;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 52px;
      padding: 0 15px;
      border: 1px solid #cfcfcf;
      border-radius: 10px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #111111;
      box-shadow: 0 0 0 3px rgba(255, 214, 0, 0.35);
    }

    button {
      width: 100%;
      height: 52px;
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      background: #ffd600;
      color: #111111;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: #f1c900;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 9px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.error {
      display: block;
      background: #fff0f0;
      border: 1px solid #e7aaaa;
      color: #9b1c1c;
    }

    .message.success {
      display: block;
      background: #edfff2;
      border: 1px solid #9bd2a7;
      color: #17652c;
    }

    .footer {
      margin-top: 24px;
      color: #777777;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="login-card">
    <div class="brand">Need-A-Cab secure administration</div>

    <h1>Permit Administration</h1>

    <p class="intro">
      Sign in to review and update live Autocab vehicle permit records.
    </p>

    <form id="loginForm" novalidate>
      <label for="password">Administration password</label>

      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required
        autofocus
      >

      <button id="loginButton" type="submit">
        Sign in securely
      </button>

      <div id="message" class="message" role="alert"></div>
    </form>

    <div class="footer">
      Secure access for authorised staff only
    </div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const loginButton = document.getElementById("loginButton");
    const message = document.getElementById("message");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message " + type;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const password = passwordInput.value;

      if (!password) {
        showMessage("Enter the administration password.", "error");
        passwordInput.focus();
        return;
      }

      loginButton.disabled = true;
      loginButton.textContent = "Signing in…";
      message.className = "message";
      message.textContent = "";

      try {
        const response = await fetch("/api/permit-login", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ password })
        });

        let result = {};

        try {
          result = await response.json();
        } catch {
          result = {};
        }

        if (!response.ok) {
          throw new Error(
            result.error ||
            `Sign-in failed with server status ${response.status}.`
          );
        }

        if (!result.ok) {
          throw new Error("The server did not confirm the sign-in.");
        }

        showMessage("Password accepted. Opening dashboard…", "success");

        window.location.replace("/dashboard");
      } catch (error) {
        console.error("Login failed:", error);

        showMessage(
          error.message || "Unable to sign in. Please try again.",
          "error"
        );

        passwordInput.select();
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = "Sign in securely";
      }
    });
  </script>
</body>
</html>
