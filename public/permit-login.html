<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Permit Administration Sign In</title><link rel="stylesheet" href="/permit-updater.css"></head><body class="login-page"><main class="login-card"><div class="brand-mark">NAC</div><p class="eyebrow">Need-A-Cab secure administration</p><h1>Permit Administration</h1><p class="subtitle">Sign in to review and update live Autocab vehicle permit records.</p><form id="loginForm"><label class="field-label">Administration password<input id="password" type="password" autocomplete="current-password" required autofocus></label><button class="primary-button wide" type="submit">Sign in securely</button><p id="loginError" class="inline-error" role="alert"></p></form></main><script>document.querySelector('#loginForm').addEventListener('submit',async e=>{e.preventDefault();const b=e.submitter;b.disabled=true;const r=await fetch('/api/permit-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.querySelector('#password').value})});const d=await r.json();if(r.ok)location.href='/permit-manager';else document.querySelector('#loginError').textContent=d.error||'Sign in failed.';b.disabled=false;});</script></body></html>
